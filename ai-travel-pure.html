<style>
.ai-page { padding: calc(var(--nav-h) + 48px) 0 60px; min-height:80vh; }
.ai-page__back {
  display:inline-flex; align-items:center; gap:6px;
  font-size:13px; color:var(--c-text-sub); text-decoration:none;
  margin-bottom:28px; transition:var(--transition);
}
.ai-page__back:hover { color:var(--c-primary); }
.ai-page__head { text-align:center; margin-bottom:44px; }
.ai-page__badge {
  display:inline-flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,#4CAF50,#009688); color:#fff;
  font-size:12px; font-weight:700; padding:6px 16px; border-radius:99px; margin-bottom:16px;
}
.ai-page__title {
  font-size:clamp(24px,3vw,36px); font-weight:800;
  background:linear-gradient(135deg,#2E7D32,#00897B);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.ai-page__sub { font-size:14px; color:var(--c-text-sub); }
.doc-zone {
  background:var(--c-surface); border-radius:var(--radius-lg);
  border:2px dashed var(--c-border); padding:48px 32px;
  text-align:center; min-height:320px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px;
}
.doc-zone__icon { font-size:56px; opacity:.6; }
.doc-zone__text { font-size:15px; color:var(--c-text-pale); line-height:1.8; max-width:480px; }
.doc-zone__hint { font-size:13px; color:var(--c-text-pale); }
.doc-zone__buttons {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px;
}
.doc-zone__btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; text-decoration: none;
  transition: var(--transition); background: var(--c-surface);
  border: 1.5px solid var(--c-border); color: var(--c-text);
}
.doc-zone__btn:hover {
  border-color: #2E7D32; color: #2E7D32; box-shadow: var(--shadow-xs);
}
.doc-zone__btn--primary {
  background: linear-gradient(135deg, #2E7D32, #009688);
  color: #fff; border-color: transparent;
}
.doc-zone__btn--primary:hover { opacity: .9; color: #fff; }
</style>

      <li><span>技术支持<svg class="nav__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></span>
        <div class="nav__dropdown">
          <a href="support.html"><span class="dd-icon">🛠️</span>支持中心</a>
          <a href="docs.html"><span class="dd-icon">📚</span>使用文档</a>

      </li>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回AI伴游

<script>
document.getElementById('mainNav').classList.toggle('scrolled',scrollY>10);
window.addEventListener('scroll',function(){document.getElementById('mainNav').classList.toggle('scrolled',scrollY>10)});
document.querySelectorAll('.nav__links > li').forEach(li=>{
  const t=li.querySelector('span');if(!t)return;
  t.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.nav__links > li.dropdown-open').forEach(el=>{if(el!==li)el.classList.remove('dropdown-open')});li.classList.toggle('dropdown-open')})
});
document.addEventListener('click',()=>document.querySelectorAll('.nav__links > li.dropdown-open').forEach(el=>el.classList.remove('dropdown-open')));
</script>
