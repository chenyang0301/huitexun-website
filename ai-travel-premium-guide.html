<style>
:root {
  --guide-primary: #E65100;
  --guide-secondary: #C62828;
  --guide-bg: #f8f9fb;
}
.guide-page { padding: calc(var(--nav-h) + 32px) 0 40px; min-height:100vh; background:var(--guide-bg); }
.guide-page__back {
  display:inline-flex; align-items:center; gap:6px;
  font-size:13px; color:var(--c-text-sub); text-decoration:none;
  margin-bottom:20px; transition:var(--transition);
}
.guide-page__back:hover { color:var(--guide-primary); }
.guide-top {
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  margin-bottom:24px; flex-wrap:wrap;
}
.guide-top__badge {
  display:inline-flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,#E65100,#C62828);
  color:#fff; font-size:12px; font-weight:700;
  padding:6px 16px; border-radius:99px;
}
.guide-top__counter { font-size:13px; color:var(--c-text-sub); font-weight:600; }
.guide-viewer {
  position:relative; background:#fff; border-radius:var(--radius-lg);
  box-shadow:0 4px 24px rgba(0,0,0,.06); overflow:hidden;
  margin-bottom:20px;
}
.guide-viewer__slide {
  display:none; padding:48px 40px; min-height:520px;
  animation:fadeSlide .35s ease;
}
.guide-viewer__slide--active { display:block; }
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.guide-cover {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; min-height:480px;
  background:linear-gradient(160deg,#E6510008,#C6282810);
}
.guide-cover__title {
  font-size:clamp(24px,3vw,36px); font-weight:800; line-height:1.3;
  background:linear-gradient(135deg,#E65100,#C62828);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.guide-cover__sub { font-size:15px; color:var(--c-text-sub); margin-top:4px; }
.guide-cover__img { max-width:320px; margin-top:24px; border-radius:12px; }
.guide-content { max-width:720px; margin:0 auto; }
.guide-content__section { margin-bottom:28px; }
.guide-content__heading {
  font-weight:800; margin-bottom:10px; padding-bottom:6px;
  border-bottom:3px solid #E65100; display:inline-block;
}
.guide-content__item {
  position:relative; padding:8px 0 8px 20px; line-height:1.7;
  color:var(--c-text);
}
.guide-content__item::before {
  content:""; position:absolute; left:0; top:16px;
  width:6px; height:6px; border-radius:50%;
  background:#E65100;
}
.guide-content__note {
  margin-top:20px; padding:14px 18px; border-radius:10px;
  background:#E651000D; border-left:3px solid #E65100;
  font-size:14px; line-height:1.7; color:#555;
}
.guide-nav {
  display:flex; align-items:center; justify-content:center; gap:12px;
}
.guide-nav__btn {
  display:inline-flex; align-items:center; justify-content:center;
  width:40px; height:40px; border-radius:50%;
  border:1.5px solid var(--c-border); background:#fff;
  cursor:pointer; transition:var(--transition);
  color:var(--c-text);
}
.guide-nav__btn:hover { border-color:#E65100; color:#E65100; background:#E6510008; }
.guide-nav__btn:disabled { opacity:.35; cursor:not-allowed; }
.guide-nav__dots { display:flex; gap:6px; }
.guide-nav__dot {
  width:8px; height:8px; border-radius:50%; background:var(--c-border);
  transition:var(--transition); cursor:pointer;
}
.guide-nav__dot--active { background:#E65100; transform:scale(1.3); }
.guide-nav__lang-toggle {
  margin-left:auto; font-size:12px; padding:6px 12px; border-radius:99px;
  border:1px solid var(--c-border); background:#fff; cursor:pointer;
  color:var(--c-text-sub); transition:var(--transition);
}
.guide-nav__lang-toggle:hover { border-color:#E65100; color:#E65100; }
@media (max-width:640px) {
  .guide-viewer__slide { padding:28px 20px; min-height:400px; }
  .guide-nav__btn { width:36px; height:36px; }
}
</style>

var imgPrefix = "premium";
var currentSlide = 0;
var langMode = "zh";

function renderRun(r, baseSize) {
  var sz = r.s || baseSize;
  var style = "font-size:" + sz + "px;";
  if (r.b) style += "font-weight:700;";
  if (r.c) style += "color:#" + r.c + ";";
  return '<span style="' + style + '">' + r.t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
}

function renderSlide(slideData, idx) {
  var shapes = slideData;
  var clsCover = (idx === 0) ? " guide-cover" : "";
  var html = '<div class="guide-viewer__slide' + (idx===0?' guide-viewer__slide--active':'') + clsCover + '">';

  if (idx === 0) {
    for (var si = 0; si < shapes.length; si++) {
      var s = shapes[si];
      if (s.img) {
        html += '<img class="guide-cover__img" src="docs/img/' + imgPrefix + '_slide' + (idx+1) + '_0.' + s.img + '" alt="cover" onerror="this.style.display='none'">';
      }
      if (s.paras) {
        if (s.paras.length > 1) {
          for (var pi = 0; pi < s.paras.length; pi++) {
            var para = s.paras[pi];
            var txt = para.runs.map(function(r){return r.t;}).join("").trim();
            if (!txt) continue;
            if (pi === 0) {
              html += '<div class="guide-cover__title">' + para.runs.map(function(r){return renderRun(r, 36);}).join("") + '</div>';
            } else {
              html += '<div class="guide-cover__sub">' + para.runs.map(function(r){return renderRun(r, 18);}).join("") + '</div>';
            }
          }
        } else {
          html += '<div class="guide-cover__title">' + s.paras[0].runs.map(function(r){return renderRun(r, 36);}).join("") + '</div>';
        }
      }
    }
  } else {
    html += '<div class="guide-content">';
    for (var si2 = 0; si2 < shapes.length; si2++) {
      var s2 = shapes[si2];
      if (!s2.paras) continue;
      for (var pi2 = 0; pi2 < s2.paras.length; pi2++) {
        var para2 = s2.paras[pi2];
        var txt2 = para2.runs.map(function(r){return r.t;}).join("").trim();
        if (!txt2) continue;
        var firstRun = para2.runs[0];
        var isBold = firstRun.b;
        var isRed = firstRun.c === "FF0000";
        var fontSize = firstRun.s || 18;
        
        if (isBold && fontSize >= 27 && !isRed) {
          html += '<div class="guide-content__section">';
          html += '<div class="guide-content__heading" style="font-size:' + fontSize + 'px">';
          html += para2.runs.map(function(r){return renderRun(r, fontSize);}).join("");
          html += '</div>';
        } else if (isBold && isRed) {
          html += '<div class="guide-content__note">';
          html += para2.runs.map(function(r){return renderRun(r, fontSize);}).join("");
          html += '</div>';
        } else {
          html += '<div class="guide-content__item" style="font-size:' + fontSize + 'px">';
          html += para2.runs.map(function(r){return renderRun(r, fontSize);}).join("");
          html += '</div>';
        }
      }
    }
    html += '</div>';
  }
  
  html += '</div>';
  return html;
}

function renderAll() {
  var viewer = document.getElementById("slideViewer");
  viewer.innerHTML = "";
  for (var i = 0; i < slidesData.length; i++) {
    viewer.innerHTML += renderSlide(slidesData[i], i);
  }
  updateNav();
}

function updateNav() {
  document.getElementById("slideCounter").textContent = (currentSlide + 1) + " / " + slidesData.length;
  document.getElementById("btnPrev").disabled = currentSlide === 0;
  document.getElementById("btnNext").disabled = currentSlide === slidesData.length - 1;
  
  var dots = document.getElementById("slideDots");
  dots.innerHTML = "";
  for (var i = 0; i < slidesData.length; i++) {
    dots.innerHTML += '<span class="guide-nav__dot' + (i === currentSlide ? ' guide-nav__dot--active' : '') + '" data-idx="' + i + '"></span>';
  }
  
  var allSlides = document.querySelectorAll(".guide-viewer__slide");
  for (var j = 0; j < allSlides.length; j++) {
    if (j === currentSlide) {
      allSlides[j].classList.add("guide-viewer__slide--active");
    } else {
      allSlides[j].classList.remove("guide-viewer__slide--active");
    }
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= slidesData.length) return;
  currentSlide = idx;
  updateNav();
}

function switchLang() {
  if (langMode === "zh") {
    langMode = "en";
    goTo(3);
  } else {
    langMode = "zh";
    goTo(0);
  }
}

document.addEventListener("DOMContentLoaded", function() {
  renderAll();
  
  document.getElementById("btnPrev").addEventListener("click", function() { goTo(currentSlide - 1); });
  document.getElementById("btnNext").addEventListener("click", function() { goTo(currentSlide + 1); });
  document.getElementById("btnLang").addEventListener("click", switchLang);
  
  document.getElementById("slideDots").addEventListener("click", function(e) {
    if (e.target.classList.contains("guide-nav__dot")) {
      goTo(parseInt(e.target.dataset.idx));
    }
  });
  
  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft") goTo(currentSlide - 1);
    if (e.key === "ArrowRight") goTo(currentSlide + 1);
  });
});

document.getElementById('mainNav').classList.toggle('scrolled',scrollY>10);
window.addEventListener('scroll',function(){document.getElementById('mainNav').classList.toggle('scrolled',scrollY>10)});
document.querySelectorAll('.nav__links > li').forEach(function(li){
  var t=li.querySelector('span');if(!t)return;
  t.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.nav__links > li.dropdown-open').forEach(function(el){if(el!==li)el.classList.remove('dropdown-open')});li.classList.toggle('dropdown-open')})
});
document.addEventListener('click',function(){document.querySelectorAll('.nav__links > li.dropdown-open').forEach(function(el){el.classList.remove('dropdown-open')})});
</script>
